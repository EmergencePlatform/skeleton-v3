name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, apcu, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        env:
          # php-core and the dwoo 1.2 fork are VCS-repository packages whose
          # dists download from api.github.com — authenticate to avoid
          # anonymous rate limits on shared runner IPs
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'

      - name: PHP syntax lint
        run: find php-classes php-config php-migrations event-handlers site-root site-tasks console-commands data-exporters dwoo-plugins -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Rector (dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Psalm (taint analysis)
        run: vendor/bin/psalm --taint-analysis --no-progress

      - name: PHP-CS-Fixer (check)
        run: vendor/bin/php-cs-fixer check --diff
        env:
          PHP_CS_FIXER_IGNORE_ENV: '1'
